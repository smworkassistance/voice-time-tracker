<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voice Time Tracker</title>
<style>
  :root{
    --bg:#000; --panel:#1c1c1e; --panel2:#2c2c2e; --text:#f5f5f7; --sub:#8e8e93;
    --useful:#34c759; --necessary:#ff9500; --waste:#ff3b30; --semi:#5ac8fa; --unset:#8e8e93;
    --accent:#0a84ff; --danger:#ff3b30;
  }
  html[data-theme="light"]{
    --bg:#f2f2f7; --panel:#ffffff; --panel2:#e5e5ea; --text:#1c1c1e; --sub:#6e6e73;
    --accent:#007aff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
    height:100%; overflow-x:hidden;}
  #app{max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; padding:14px 16px 40px;}

  .topbar{display:flex; gap:10px; margin-bottom:18px;}
  .timebox{flex:1; background:var(--panel); border-radius:16px; padding:12px 14px;}
  .timebox .label{font-size:11px; color:var(--sub); text-transform:uppercase; letter-spacing:.5px;}
  .timebox .remaining{font-size:20px; font-weight:600; margin-top:2px;}
  .timebox .elapsed{font-size:12px; color:var(--sub); margin-top:2px;}

  .activity-card{background:var(--panel); border-radius:24px; padding:28px 20px; text-align:center; margin-bottom:18px;}
  .activity-name{font-size:15px; color:var(--sub); min-height:20px; word-break:break-word;}
  .activity-tag-badge{display:inline-block; margin-top:6px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.4px;}
  .activity-elapsed{font-size:52px; font-weight:700; font-variant-numeric:tabular-nums; margin-top:10px; letter-spacing:1px;}
  .activity-idle{color:var(--sub); font-size:18px; margin-top:14px;}

  .stale-banner{display:flex; align-items:center; gap:10px; background:var(--necessary); color:#1c1c1e; border-radius:14px; padding:12px 14px; margin-bottom:18px; font-size:13px; font-weight:600;}
  .stale-banner.hidden{display:none;}
  .stale-dismiss{background:rgba(0,0,0,.15); color:#1c1c1e; border-radius:10px; padding:6px 12px; font-size:12px; font-weight:700; flex-shrink:0;}

  .btn-row{display:flex; gap:12px; margin-bottom:18px;}
  button{border:none; cursor:pointer; font-family:inherit;}
  .btn{flex:1; padding:18px 10px; border-radius:18px; font-size:16px; font-weight:600; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .1s;}
  .btn:active{transform:scale(.96);}
  .btn-start{background:var(--useful);}
  .btn-lap{background:var(--accent);}
  .btn-stop{background:var(--panel2); color:var(--text);}
  .btn-endday{background:var(--panel2); color:var(--text);}
  .btn:disabled{opacity:.35; cursor:not-allowed;}
  .btn .ic{font-size:18px;}

  .laps-header{display:flex; justify-content:space-between; align-items:center; margin:6px 0 8px;}
  .laps-header h3{font-size:13px; color:var(--sub); text-transform:uppercase; letter-spacing:.5px; font-weight:600; margin:0;}
  .undo-link{font-size:13px; color:var(--accent); background:none;}

  .lap-item{display:flex; align-items:center; background:var(--panel); border-radius:14px; padding:12px 14px; margin-bottom:8px; border-left:4px solid var(--unset);}
  .lap-item.useful{border-left-color:var(--useful);}
  .lap-item.necessary{border-left-color:var(--necessary);}
  .lap-item.waste{border-left-color:var(--waste);}
  .lap-item.semi-useful{border-left-color:var(--semi);}
  .lap-main{flex:1; min-width:0;}
  .lap-name{font-size:15px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .lap-meta{font-size:12px; color:var(--sub); margin-top:2px;}
  .lap-duration{font-size:15px; font-weight:600; font-variant-numeric:tabular-nums; margin-left:10px; white-space:nowrap;}
  .empty-state{color:var(--sub); text-align:center; font-size:14px; padding:30px 10px;}

  /* Voice overlay */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:flex-end; z-index:50;}
  .overlay.hidden{display:none;}
  .sheet{background:var(--panel); width:100%; max-width:480px; margin:0 auto; border-radius:24px 24px 0 0; padding:22px 20px 28px; animation:slideup .2s ease-out;}
  @keyframes slideup{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .mic-pulse{width:64px; height:64px; border-radius:50%; background:var(--accent); margin:0 auto 16px; display:flex; align-items:center; justify-content:center; font-size:28px;}
  .mic-pulse.listening{animation:pulse 1.2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(10,132,255,.5);} 70%{box-shadow:0 0 0 18px rgba(10,132,255,0);} 100%{box-shadow:0 0 0 0 rgba(10,132,255,0);}}
  .sheet-status{text-align:center; color:var(--sub); font-size:13px; margin-bottom:14px;}
  .transcript-box{width:100%; background:var(--panel2); border:none; border-radius:14px; color:var(--text); font-size:16px; padding:14px; min-height:70px; resize:none; font-family:inherit;}
  .parsed-preview{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .parsed-chip{background:var(--panel2); border-radius:20px; padding:6px 12px; font-size:13px; color:var(--sub);}
  .parsed-chip b{color:var(--text);}
  .sheet-actions{display:flex; gap:10px; margin-top:16px;}
  .sheet-actions.hidden{display:none;}
  .sheet-actions .btn{padding:14px 10px; border-radius:14px; font-size:15px;}
  .lang-toggle{position:absolute; top:16px; right:16px; background:none; color:var(--sub); font-size:12px; border:1px solid var(--panel2); padding:4px 10px; border-radius:12px;}
  .theme-toggle{position:absolute; top:16px; right:78px; background:none; color:var(--sub); font-size:12px; border:1px solid var(--panel2); padding:4px 10px; border-radius:12px;}

  .summary-overlay{position:fixed; inset:0; background:rgba(0,0,0,.9); display:flex; align-items:center; justify-content:center; z-index:60; padding:20px;}
  .summary-overlay.hidden{display:none;}
  .summary-card{background:var(--panel); border-radius:24px; padding:24px 22px; max-width:420px; width:100%; max-height:85vh; overflow-y:auto;}
  .summary-card h2{margin:0 0 14px; font-size:19px;}
  .summary-date-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .summary-date-row input[type="date"]{flex:1; background:var(--panel2); color:var(--text); border:none; border-radius:10px; padding:8px 10px; font-size:14px; font-family:inherit;}
  .date-nav-btn{background:var(--panel2); color:var(--text); width:36px; height:36px; border-radius:10px; font-size:18px; flex-shrink:0;}
  .summary-row{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--panel2); font-size:14px;}
  .summary-row .val{font-weight:600;}
  .summary-close{width:100%; margin-top:16px; padding:14px; border-radius:14px; background:var(--accent); color:#fff; font-weight:600;}

  .top-actions{position:relative;}
</style>
</head>
<body>
<div id="app">

  <div class="top-actions">
    <button class="theme-toggle" id="themeToggle">🌙</button>
    <button class="lang-toggle" id="langToggle">EN-IN</button>
  </div>

  <div class="topbar">
    <div class="timebox">
      <div class="label">Day</div>
      <div class="remaining" id="dayRemaining">--</div>
      <div class="elapsed" id="dayElapsed">--</div>
    </div>
    <div class="timebox">
      <div class="label">Week</div>
      <div class="remaining" id="weekRemaining">--</div>
      <div class="elapsed" id="weekElapsed">--</div>
    </div>
  </div>

  <div class="activity-card">
    <div class="activity-name" id="activityName">No activity yet</div>
    <div id="activityTagWrap"></div>
    <div class="activity-elapsed" id="activityElapsed">00:00:00</div>
    <div class="activity-idle" id="activityIdleMsg">Tap Start and speak</div>
  </div>

  <div class="stale-banner hidden" id="staleActivityBanner">
    <span id="staleActivityMsg">⏰ This has been running a while — still doing it, or forgot to Lap/Stop?</span>
    <button class="stale-dismiss" id="staleDismiss">Dismiss</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="btnStart"><span class="ic">🎙️</span> Start</button>
    <button class="btn btn-lap" id="btnLap" disabled><span class="ic">🎙️</span> Lap</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
    <button class="btn btn-endday" id="btnEndDay">End Day</button>
  </div>

  <div class="laps-header">
    <h3>Today's Laps</h3>
    <div style="display:flex; gap:14px;">
      <button class="undo-link" id="btnReports">📊 Reports</button>
      <button class="undo-link" id="btnUndo">Undo last</button>
    </div>
  </div>
  <div id="lapsList"></div>

</div>

<!-- Voice overlay -->
<div class="overlay hidden" id="voiceOverlay">
  <div class="sheet">
    <div class="mic-pulse" id="micPulse">🎙️</div>
    <div class="sheet-status" id="sheetStatus">Recording…</div>
    <textarea class="transcript-box" id="transcriptBox" placeholder="Speak, then tap Done — or type here…"></textarea>
    <div class="parsed-preview" id="parsedPreview"></div>
    <div class="sheet-actions" id="recordingActions">
      <button class="btn btn-start" id="btnDone" style="flex:1;">⏹ Done — Transcribe</button>
    </div>
    <div class="sheet-actions hidden" id="reviewActions">
      <button class="btn btn-stop" id="btnRerecord" style="flex:1;">Re-record</button>
      <button class="btn btn-start" id="btnConfirm" style="flex:1;">Confirm</button>
    </div>
  </div>
</div>

<!-- End day summary -->
<div class="summary-overlay hidden" id="summaryOverlay">
  <div class="summary-card">
    <div class="summary-date-row">
      <button class="date-nav-btn" id="summaryPrevDay">‹</button>
      <input type="date" id="summaryDateInput">
      <button class="date-nav-btn" id="summaryNextDay">›</button>
    </div>
    <h2 id="summaryTitle">📊 Today's Report</h2>
    <div id="summaryBody"></div>
    <button class="summary-close" id="summaryClose">Close</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  // Cloudflare Worker base URL.
  const API_BASE = "https://orange-violet-75d5.smworkassistance.workers.dev";

  const STORAGE_KEY = "vtt_state_v1";
  const TAG_KEYWORDS = [
    {tag:"waste", words:["time waste","waste of time","waste"]},
    {tag:"semi-useful", words:["semi useful","semi-useful"]},
    {tag:"necessary", words:["necessary but unplanned","necessary"]},
    {tag:"useful", words:["useful"]}
  ];
  const TAG_LABEL = {useful:"Useful", necessary:"Necessary", waste:"Waste", "semi-useful":"Semi-useful"};

  function todayKey(d){ d = d || new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function dayKeyToDate(dayKey){ const p = dayKey.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); }
  function startOfDay(d){ const n = new Date(d); n.setHours(0,0,0,0); return n; }
  function endOfDay(d){ const n = new Date(d); n.setHours(23,59,59,999); return n; }
  function startOfWeek(d){ // Monday 00:00
    const n = startOfDay(d); const day = n.getDay(); const diff = (day === 0 ? 6 : day - 1);
    n.setDate(n.getDate() - diff); return n;
  }
  function fmtHM(ms){
    if(ms < 0) ms = 0;
    const totalMin = Math.floor(ms/60000);
    const h = Math.floor(totalMin/60), m = totalMin%60;
    if(h <= 0) return m + "m";
    return h + "h " + m + "m";
  }
  function fmtHMS(ms){
    if(ms < 0) ms = 0;
    const s = Math.floor(ms/1000);
    const hh = Math.floor(s/3600), mm = Math.floor((s%3600)/60), ss = s%60;
    return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0")+":"+String(ss).padStart(2,"0");
  }
  function fmtTime(d){
    return new Date(d).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  function defaultState(){
    return { history:{}, currentActivity:null, todayKey: todayKey(), lang:"en-IN", theme:"dark", insightsCache:{} };
  }
  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return defaultState();
      const s = JSON.parse(raw);
      if(!s.history) s.history = {};
      if(s.lang === undefined) s.lang = "en-IN";
      if(s.theme === undefined) s.theme = "dark";
      if(!s.insightsCache) s.insightsCache = {};
      return s;
    }catch(e){ return defaultState(); }
  }
  function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  let state = loadState();

  function todayLog(){
    if(!state.history[state.todayKey]) state.history[state.todayKey] = [];
    return state.history[state.todayKey];
  }

  // ---- Cloud sync (Supabase, via the Worker) — best-effort, offline-friendly ----
  // localStorage stays the source of truth; this is a fire-and-forget mirror so
  // history survives a cleared browser / lets a new device recover past days.
  function syncDayToCloud(dayKey){
    fetch(API_BASE + "/sync", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ dayKey: dayKey, activities: state.history[dayKey] || [] })
    }).catch(function(){ /* offline or Worker unreachable — ignore, local data is safe */ });
  }

  async function hydrateHistoryFromCloud(){
    try{
      const res = await fetch(API_BASE + "/history");
      const data = await res.json();
      if(!res.ok || data.error) return;
      let changed = false;
      Object.keys(data.history || {}).forEach(function(dayKey){
        const cloudEntries = data.history[dayKey] || [];
        const localEntries = state.history[dayKey];
        if(!localEntries || localEntries.length === 0){
          // No local data for this day (a fresh browser starts today as an
          // empty array) — just take the cloud copy.
          if(cloudEntries.length > 0){
            state.history[dayKey] = cloudEntries;
            changed = true;
          }
        } else {
          // Merge by id so entries logged on another device/browser show up
          // alongside ones already recorded locally, without duplicating.
          const localIds = new Set(localEntries.map(function(e){ return e.id; }));
          const merged = localEntries.slice();
          cloudEntries.forEach(function(e){
            if(!localIds.has(e.id)) merged.push(e);
          });
          if(merged.length !== localEntries.length){
            merged.sort(function(a,b){ return a.start - b.start; });
            state.history[dayKey] = merged;
            changed = true;
          }
        }
      });
      if(changed){ saveState(); renderAll(); }
    }catch(e){ /* offline or Worker unreachable — local data is unaffected */ }
  }

  // ---- Day-boundary rollover handling (edge case: midnight crossing, app closed) ----
  function rolloverIfNeeded(){
    const tk = todayKey();
    if(tk === state.todayKey) return;

    const closedDayKey = state.todayKey;
    if(state.currentActivity){
      const startDate = new Date(state.currentActivity.start);
      const startDay = todayKey(startDate);
      if(startDay === state.todayKey){
        // Activity was running when the clock crossed midnight (or a single-day gap).
        // Close it out at the end of the day it started on.
        const boundary = endOfDay(startDate).getTime() + 1; // 00:00:00.000 next day
        const closedDuration = boundary - state.currentActivity.start;
        todayLog().push(Object.assign({}, state.currentActivity, {
          id: uid(), end: boundary, duration: closedDuration
        }));
        // Continue same activity into the new day, but only if it's the very next day
        // (app stayed open / reopened same-day gap). If multiple days passed, go idle instead.
        const dayDiffMs = startOfDay(new Date()).getTime() - startOfDay(startDate).getTime();
        const oneDay = 24*60*60*1000;
        if(dayDiffMs <= oneDay){
          state.currentActivity.start = startOfDay(new Date()).getTime();
          // will be re-logged under the new day key below
        } else {
          state.currentActivity = null;
        }
      } else {
        // Already spans further back somehow — just drop into idle to avoid bad data.
        state.currentActivity = null;
      }
    }
    state.todayKey = tk;
    if(!state.history[tk]) state.history[tk] = [];
    saveState();
    syncDayToCloud(closedDayKey);
  }

  // ---- Tag parsing ----
  function parseVoiceText(text){
    const raw = text.trim();
    const lower = raw.toLowerCase();

    // Collect every keyword occurrence, then prefer the match ending furthest
    // right (the tag is spoken last); ties go to the longer/earlier-starting
    // phrase so "time waste" wins over the "waste" it contains.
    let best = null;
    for(const entry of TAG_KEYWORDS){
      for(const w of entry.words){
        const idx = lower.lastIndexOf(w);
        if(idx === -1) continue;
        const end = idx + w.length;
        if(!best || end > best.end || (end === best.end && idx < best.idx)){
          best = { tag: entry.tag, idx, end };
        }
      }
    }

    let name = raw;
    if(best){
      name = raw.slice(0, best.idx).replace(/[,\s]+$/,"").trim();
    }
    if(!name) name = raw;
    return { name, tag: best ? best.tag : null, rawText: raw };
  }

  // ---- Timer display ----
  function tick(){
    const now = new Date();
    rolloverIfNeeded();

    const dayStart = startOfDay(now), dayEnd = endOfDay(now);
    document.getElementById("dayRemaining").textContent = fmtHM(dayEnd - now + 1) + " left";
    document.getElementById("dayElapsed").textContent = fmtHM(now - dayStart) + " elapsed";

    const weekStart = startOfWeek(now);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+7);
    document.getElementById("weekRemaining").textContent = fmtHM(weekEnd - now) + " left";
    document.getElementById("weekElapsed").textContent = fmtHM(now - weekStart) + " elapsed";

    if(state.currentActivity){
      document.getElementById("activityElapsed").textContent = fmtHMS(now - state.currentActivity.start);
    }
    checkStaleActivity();
  }

  const STALE_ACTIVITY_MS = 3*60*60*1000; // 3 hours — likely forgotten, not a real long task
  let staleDismissedStart = null;
  function checkStaleActivity(){
    const banner = document.getElementById("staleActivityBanner");
    if(!state.currentActivity){ banner.classList.add("hidden"); return; }
    const elapsed = Date.now() - state.currentActivity.start;
    const isStale = elapsed > STALE_ACTIVITY_MS && staleDismissedStart !== state.currentActivity.start;
    banner.classList.toggle("hidden", !isStale);
    if(isStale){
      document.getElementById("staleActivityMsg").textContent =
        `⏰ "${state.currentActivity.name}" has been running ${fmtHM(elapsed)} — still doing it, or forgot to Lap/Stop?`;
    }
  }
  document.getElementById("staleDismiss").addEventListener("click", function(){
    if(state.currentActivity) staleDismissedStart = state.currentActivity.start;
    document.getElementById("staleActivityBanner").classList.add("hidden");
  });

  function renderActivityCard(){
    const nameEl = document.getElementById("activityName");
    const tagWrap = document.getElementById("activityTagWrap");
    const idleMsg = document.getElementById("activityIdleMsg");
    const cur = state.currentActivity;
    if(cur){
      nameEl.textContent = cur.name;
      tagWrap.innerHTML = cur.tag
        ? `<span class="activity-tag-badge" style="background:var(--${cur.tag});color:#000">${TAG_LABEL[cur.tag]}</span>`
        : `<span class="activity-tag-badge" style="background:var(--unset);color:#000">Untagged</span>`;
      idleMsg.style.display = "none";
    } else {
      nameEl.textContent = "No activity running";
      tagWrap.innerHTML = "";
      document.getElementById("activityElapsed").textContent = "00:00:00";
      idleMsg.style.display = "block";
    }
    document.getElementById("btnStart").disabled = !!cur;
    document.getElementById("btnLap").disabled = !cur;
    document.getElementById("btnStop").disabled = !cur;
  }

  function renderLaps(){
    const list = document.getElementById("lapsList");
    const log = todayLog().slice().reverse();
    if(log.length === 0){
      list.innerHTML = `<div class="empty-state">No activities logged yet today.</div>`;
      return;
    }
    list.innerHTML = log.map(function(lap){
      const cls = lap.tag || "";
      const tagText = lap.tag ? TAG_LABEL[lap.tag] : "Untagged";
      return `<div class="lap-item ${cls}">
        <div class="lap-main">
          <div class="lap-name">${escapeHtml(lap.name)}</div>
          <div class="lap-meta">${fmtTime(lap.start)} – ${fmtTime(lap.end)} · ${tagText}</div>
        </div>
        <div class="lap-duration">${fmtHM(lap.duration)}</div>
      </div>`;
    }).join("");
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function renderAll(){ renderActivityCard(); renderLaps(); }

  // ---- Lap/start logic ----
  function closeCurrentActivity(now){
    if(!state.currentActivity) return;
    const dur = now - state.currentActivity.start;
    todayLog().push(Object.assign({}, state.currentActivity, {
      id: uid(), end: now, duration: dur
    }));
    state.currentActivity = null;
  }

  function startNewActivity(parsed, now){
    state.currentActivity = { name: parsed.name, tag: parsed.tag, rawText: parsed.rawText, start: now };
  }

  function handleConfirmedText(text, mode){
    const parsed = parseVoiceText(text);
    if(!parsed.name){ return; }
    const now = Date.now();
    if(mode === "lap" && state.currentActivity){
      closeCurrentActivity(now);
    }
    startNewActivity(parsed, now);
    saveState();
    renderAll();
    syncDayToCloud(state.todayKey);
  }

  // ---- Voice capture: raw PCM via Web Audio API, transcribed by a cloud STT
  // backend (Worker). This works identically on Safari/iOS, unlike the old
  // Web Speech API approach which iOS Safari doesn't implement at all.
  let pendingMode = null; // "start" | "lap"
  let audioCtx = null, mediaStream = null, sourceNode = null, processorNode = null, pcmChunks = [];

  function setSheetStatus(msg){ document.getElementById("sheetStatus").textContent = msg; }

  function updateParsedPreview(){
    const text = document.getElementById("transcriptBox").value;
    const preview = document.getElementById("parsedPreview");
    if(!text.trim()){ preview.innerHTML = ""; return; }
    const parsed = parseVoiceText(text);
    preview.innerHTML =
      `<div class="parsed-chip">Activity: <b>${escapeHtml(parsed.name || "—")}</b></div>` +
      `<div class="parsed-chip">Tag: <b>${parsed.tag ? TAG_LABEL[parsed.tag] : "none (AI will classify later)"}</b></div>`;
  }

  function showRecordingActions(){
    document.getElementById("recordingActions").classList.remove("hidden");
    document.getElementById("reviewActions").classList.add("hidden");
    document.getElementById("btnDone").disabled = false;
  }
  function showReviewActions(){
    document.getElementById("recordingActions").classList.add("hidden");
    document.getElementById("reviewActions").classList.remove("hidden");
  }

  async function beginRecording(){
    pcmChunks = [];
    try{
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }catch(e){
      setSheetStatus("Mic access denied — you can type the activity below instead.");
      showReviewActions();
      return;
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioCtx.createMediaStreamSource(mediaStream);
    processorNode = audioCtx.createScriptProcessor(4096, 1, 1);
    const silentGain = audioCtx.createGain();
    silentGain.gain.value = 0;
    processorNode.onaudioprocess = function(e){
      pcmChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };
    sourceNode.connect(processorNode);
    processorNode.connect(silentGain);
    silentGain.connect(audioCtx.destination);
    document.getElementById("micPulse").classList.add("listening");
    setSheetStatus("Recording… tap Done when finished.");
  }

  function mergeFloat32(chunks){
    let total = 0;
    chunks.forEach(function(c){ total += c.length; });
    const result = new Float32Array(total);
    let offset = 0;
    chunks.forEach(function(c){ result.set(c, offset); offset += c.length; });
    return result;
  }
  function downsampleTo16k(samples, originalRate){
    if(originalRate === 16000) return samples;
    const ratio = originalRate / 16000;
    const newLength = Math.round(samples.length / ratio);
    const result = new Float32Array(newLength);
    for(let i=0;i<newLength;i++){
      result[i] = samples[Math.min(samples.length - 1, Math.round(i * ratio))];
    }
    return result;
  }
  function encodeWavPCM16(samples, sampleRate){
    const buffer = new ArrayBuffer(44 + samples.length * 2);
    const view = new DataView(buffer);
    function writeString(offset, str){ for(let i=0;i<str.length;i++) view.setUint8(offset + i, str.charCodeAt(i)); }
    writeString(0, "RIFF");
    view.setUint32(4, 36 + samples.length * 2, true);
    writeString(8, "WAVE");
    writeString(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, "data");
    view.setUint32(40, samples.length * 2, true);
    let offset = 44;
    for(let i=0;i<samples.length;i++){
      const s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
    return buffer;
  }
  function arrayBufferToBase64(buffer){
    const bytes = new Uint8Array(buffer);
    let binary = "";
    const chunkSize = 0x8000;
    for(let i=0;i<bytes.length;i+=chunkSize){
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    return btoa(binary);
  }

  function stopRecordingToBase64(){
    if(!mediaStream){ return null; }
    mediaStream.getTracks().forEach(function(t){ t.stop(); });
    if(processorNode) processorNode.disconnect();
    if(sourceNode) sourceNode.disconnect();
    const originalRate = audioCtx ? audioCtx.sampleRate : 16000;
    const merged = mergeFloat32(pcmChunks);
    const resampled = downsampleTo16k(merged, originalRate);
    const wavBuffer = encodeWavPCM16(resampled, 16000);
    if(audioCtx) audioCtx.close();
    mediaStream = null; audioCtx = null; sourceNode = null; processorNode = null;
    return arrayBufferToBase64(wavBuffer);
  }

  async function finishRecordingAndTranscribe(){
    document.getElementById("micPulse").classList.remove("listening");
    document.getElementById("btnDone").disabled = true;
    setSheetStatus("Transcribing…");
    const base64 = stopRecordingToBase64();
    if(!base64){ setSheetStatus("No recording captured — type below."); showReviewActions(); return; }
    try{
      const res = await fetch(API_BASE + "/transcribe", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ audioBase64: base64, sampleRateHertz: 16000, languageCode: state.lang })
      });
      const data = await res.json();
      if(!res.ok || data.error) throw new Error(data.error || "Transcription failed");
      document.getElementById("transcriptBox").value = data.transcript || "";
      updateParsedPreview();
      setSheetStatus(data.transcript ? "Review and confirm, or edit." : "Didn't catch that — type it below.");
    }catch(e){
      setSheetStatus("Couldn't reach transcription service — type the activity below.");
    }
    showReviewActions();
  }

  function openVoiceSheet(mode){
    pendingMode = mode;
    document.getElementById("transcriptBox").value = "";
    document.getElementById("parsedPreview").innerHTML = "";
    document.getElementById("voiceOverlay").classList.remove("hidden");
    showRecordingActions();
    beginRecording();
  }
  function closeVoiceSheet(){
    document.getElementById("voiceOverlay").classList.add("hidden");
    if(mediaStream){ try{ stopRecordingToBase64(); }catch(e){} }
  }

  document.getElementById("btnStart").addEventListener("click", function(){ openVoiceSheet("start"); });
  document.getElementById("btnLap").addEventListener("click", function(){ openVoiceSheet("lap"); });
  document.getElementById("btnDone").addEventListener("click", finishRecordingAndTranscribe);
  document.getElementById("btnRerecord").addEventListener("click", function(){
    showRecordingActions();
    beginRecording();
  });
  document.getElementById("transcriptBox").addEventListener("input", updateParsedPreview);
  document.getElementById("btnConfirm").addEventListener("click", function(){
    const text = document.getElementById("transcriptBox").value;
    if(!text.trim()) return;
    handleConfirmedText(text, pendingMode);
    closeVoiceSheet();
  });

  document.getElementById("btnStop").addEventListener("click", function(){
    closeCurrentActivity(Date.now());
    saveState();
    renderAll();
    syncDayToCloud(state.todayKey);
  });

  document.getElementById("btnUndo").addEventListener("click", function(){
    const log = todayLog();
    if(log.length === 0) return;
    log.pop();
    saveState();
    renderAll();
    syncDayToCloud(state.todayKey);
  });

  document.getElementById("langToggle").addEventListener("click", function(){
    state.lang = state.lang === "en-IN" ? "hi-IN" : "en-IN";
    document.getElementById("langToggle").textContent = state.lang.toUpperCase();
    saveState();
  });
  document.getElementById("langToggle").textContent = state.lang.toUpperCase();

  function applyTheme(){
    document.documentElement.setAttribute("data-theme", state.theme);
    document.getElementById("themeToggle").textContent = state.theme === "dark" ? "🌙" : "☀️";
  }
  document.getElementById("themeToggle").addEventListener("click", function(){
    state.theme = state.theme === "dark" ? "light" : "dark";
    applyTheme();
    saveState();
  });
  applyTheme();

  // ---- End Day summary ----
  document.getElementById("btnEndDay").addEventListener("click", function(){
    if(state.currentActivity){
      closeCurrentActivity(Date.now());
      saveState();
      renderAll();
      syncDayToCloud(state.todayKey);
    }
    showSummary();
  });
  document.getElementById("summaryClose").addEventListener("click", function(){
    document.getElementById("summaryOverlay").classList.add("hidden");
  });

  function computeDayStats(dayKey){
    const log = state.history[dayKey] || [];
    const totals = {useful:0, necessary:0, waste:0, "semi-useful":0, unset:0};
    let totalLogged = 0;
    log.forEach(function(l){
      const key = l.tag || "unset";
      totals[key] = (totals[key]||0) + l.duration;
      totalLogged += l.duration;
    });
    const isToday = dayKey === state.todayKey;
    const dayElapsed = isToday ? (Date.now() - startOfDay(new Date()).getTime()) : 24*60*60*1000;

    // 12am-6am is assumed sleep unless the user actually logged something then
    // (an explicit override) -- don't count normal sleep as an "unaccounted" gap,
    // and don't let it dilute the productivity score either.
    const dayStartAbs = startOfDay(dayKeyToDate(dayKey)).getTime();
    const sleepWinStart = dayStartAbs;
    const sleepWinEnd = dayStartAbs + 6*60*60*1000;
    const sleepWindowMs = Math.max(0, Math.min(dayElapsed, sleepWinEnd - dayStartAbs));
    let loggedDuringSleep = 0;
    log.forEach(function(l){
      const overlapStart = Math.max(l.start, sleepWinStart);
      const overlapEnd = Math.min(l.end, sleepWinEnd);
      if(overlapEnd > overlapStart) loggedDuringSleep += (overlapEnd - overlapStart);
    });
    const sleepMs = Math.max(0, sleepWindowMs - loggedDuringSleep);
    const unaccounted = Math.max(0, dayElapsed - totalLogged - sleepMs);
    const wakingElapsed = Math.max(1, dayElapsed - sleepMs);
    const score = Math.round(((totals.useful + totals.necessary*0.5) / wakingElapsed) * 100);
    return { totals, dayElapsed, unaccounted, sleepMs, score };
  }

  function buildRows(stats){
    return [
      ["✅ Useful", stats.totals.useful, "useful"],
      ["⚠️ Necessary", stats.totals.necessary, "necessary"],
      ["🔵 Semi-useful", stats.totals["semi-useful"], "semi-useful"],
      ["❌ Waste", stats.totals.waste, "waste"],
      ["⬜ Untagged", stats.totals.unset, "unset"],
      ["😴 Sleep (auto, 12-6am)", stats.sleepMs, ""],
      ["❓ Unaccounted", stats.unaccounted, ""]
    ];
  }

  function rowsHtml(score, stats){
    const pct = function(ms){ return stats.dayElapsed > 0 ? Math.round((ms/stats.dayElapsed)*100) : 0; };
    return `<div class="summary-row"><span>Productivity Score</span><span class="val">${score}/100</span></div>` +
      buildRows(stats).map(function(r){
        return `<div class="summary-row"><span>${r[0]}</span><span class="val">${fmtHM(r[1])} (${pct(r[1])}%)</span></div>`;
      }).join("");
  }

  function formatDateLabel(dayKey){
    const d = dayKeyToDate(dayKey);
    const label = d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
    return dayKey === state.todayKey ? "Today — " + label : label;
  }

  async function showSummaryForDate(dayKey){
    let stats = computeDayStats(dayKey);
    const log = state.history[dayKey] || [];
    const isToday = dayKey === state.todayKey;

    document.getElementById("summaryDateInput").max = state.todayKey;
    document.getElementById("summaryDateInput").value = dayKey;
    document.getElementById("summaryTitle").textContent = "📊 " + formatDateLabel(dayKey);
    document.getElementById("summaryBody").innerHTML = rowsHtml(stats.score, stats) +
      `<div id="aiInsights" style="margin-top:14px; font-size:13px; color:var(--sub);">🔄 Getting AI insights…</div>`;
    document.getElementById("summaryOverlay").classList.remove("hidden");

    // Past days never change once viewed, so cache the AI result instead of
    // re-spending a Gemini call every time the user scrubs through history.
    const cached = state.insightsCache[dayKey];
    if(!isToday && cached){
      document.getElementById("summaryBody").innerHTML =
        rowsHtml(typeof cached.score === "number" ? cached.score : stats.score, stats) +
        `<div style="margin-top:14px; font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:.5px;">AI Insights</div>` +
        cached.insightsHtml;
      return;
    }

    try{
      const res = await fetch(API_BASE + "/insights", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          dateLabel: dayKey,
          dayElapsedMs: stats.dayElapsed,
          sleepMs: stats.sleepMs,
          activities: log.map(function(l){ return { id: l.id, name: l.name, tag: l.tag, rawText: l.rawText, duration: l.duration }; })
        })
      });
      const data = await res.json();
      if(!res.ok || data.error) throw new Error(data.error || "Insights request failed");

      // Apply Gemini's tag for every activity: it reads the full spoken sentence
      // (rawText) and correctly picks up tags the local keyword matcher misses,
      // e.g. tags spoken in Hindi/Hinglish rather than the exact English word.
      if(Array.isArray(data.classifications) && data.classifications.length){
        data.classifications.forEach(function(c){
          const lap = log.find(function(l){ return l.id === c.id; });
          if(lap && c.tag){ lap.tag = c.tag; }
        });
        saveState();
        syncDayToCloud(dayKey);
        if(isToday) renderAll();
        stats = computeDayStats(dayKey);
      }

      const insightsHtml = (data.insights || [])
        .map(function(i){ return `<div style="margin-top:6px; font-size:14px;">💡 ${escapeHtml(i)}</div>`; })
        .join("");
      const finalScore = typeof data.score === "number" ? data.score : stats.score;
      document.getElementById("summaryBody").innerHTML =
        rowsHtml(finalScore, stats) +
        `<div style="margin-top:14px; font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:.5px;">AI Insights</div>` +
        insightsHtml;

      if(!isToday){
        state.insightsCache[dayKey] = { score: finalScore, insightsHtml: insightsHtml };
        saveState();
      }
    }catch(e){
      const el = document.getElementById("aiInsights");
      if(el) el.textContent = "Couldn't reach AI insights service — showing local totals only.";
    }
  }

  function showSummary(){ showSummaryForDate(state.todayKey); }

  document.getElementById("btnReports").addEventListener("click", function(){
    showSummaryForDate(state.todayKey);
  });
  document.getElementById("summaryDateInput").max = state.todayKey;
  document.getElementById("summaryDateInput").addEventListener("change", function(e){
    if(e.target.value) showSummaryForDate(e.target.value);
  });
  document.getElementById("summaryPrevDay").addEventListener("click", function(){
    const cur = dayKeyToDate(document.getElementById("summaryDateInput").value || state.todayKey);
    cur.setDate(cur.getDate() - 1);
    showSummaryForDate(todayKey(cur));
  });
  document.getElementById("summaryNextDay").addEventListener("click", function(){
    const cur = dayKeyToDate(document.getElementById("summaryDateInput").value || state.todayKey);
    cur.setDate(cur.getDate() + 1);
    const nextKey = todayKey(cur);
    if(nextKey > state.todayKey) return;
    showSummaryForDate(nextKey);
  });

  // ---- Init ----
  rolloverIfNeeded();
  renderAll();
  tick();
  setInterval(tick, 1000);
  hydrateHistoryFromCloud();

})();
</script>
